function buildSelect(id, options, placeholder) {
    const sel = document.getElementById(id);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = `<option value="">${placeholder}</option>` + options.map(o => `<option value="${o}"${current===o?' selected':''}>${o}</option>`).join('');
}

function buildPills(groupId, options) {
    const container = document.getElementById(groupId);
    if (!container) return;
    const selected = checks[groupId] || [];
    // Remap: keep selected values by position if language changed
    checks[groupId] = [];
    container.innerHTML = options.map((o,i) => `
        <div class="pill${selected.length > i && selected[i] ? ' checked':''}" data-val="${o}" onclick="togglePill(this,'${groupId}')">
            <span class="pill-box">
                <svg class="checkmark" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>${o}
        </div>`).join('');
}

function updateProgress() {
    const t = T[lang];
    document.getElementById('progressFill').style.width = (currentSec/TOTAL*100)+'%';
    document.getElementById('progressText').textContent = t.progress(currentSec, TOTAL);
}

function togglePill(el, group) {
    const val = el.dataset.val;
    if (checks[group].includes(val)) { checks[group]=checks[group].filter(v=>v!==val); el.classList.remove('checked'); }
    else { checks[group].push(val); el.classList.add('checked'); }
}

    if (!val) return val;
    // For comma-separated pill values
    if (val.includes(', ')) return val.split(', ').map(v => EN_VALUES[v] || v).join(', ');
    return EN_VALUES[val] || val;
}

function getVal(id) {
    if (id in checks) return checks[id].join(', ');
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
}

function getEnVal(id) {
    const v = getVal(id);
    return toEnglish(v);
}

function validate(secNum) {
    const t = T[lang];
    for (const id of (REQUIRED[secNum]||[])) {
        if (!getVal(id)) {
            const el = document.getElementById(id);
            if (el) { el.style.borderColor='#e53e3e'; el.focus(); }
            alert(t.alertRequired);
            return false;
        }
    }
    (REQUIRED[secNum]||[]).forEach(id => { const el=document.getElementById(id); if(el) el.style.borderColor='#e2e8f0'; });
    return true;
}

function goTo(from, to) {
    if (to > from && !validate(from)) return;
    document.getElementById('sec'+from).classList.add('hidden');
    document.getElementById('sec'+to).classList.remove('hidden');
    currentSec=to; updateProgress(); window.scrollTo(0,0);
}

function showSummary() {
    if (!validate(6)) return;
    const t = T[lang];
    let html = '';
    FIELDS_BY_SECTION.forEach((fields, i) => {
        const rows = fields.map(id => {
            const v = getVal(id); if (!v) return '';
            return `<div class="summary-row"><span class="summary-label">${t.labels[id]||id}</span><span class="summary-val">${v}</span></div>`;
        }).filter(Boolean).join('');
        if (rows) html += `<div class="summary-block"><h3>${t.sectionTitles[i]}</h3>${rows}</div>`;
    });
    document.getElementById('summaryContent').innerHTML = html;
    document.getElementById('sec6').classList.add('hidden');
    document.getElementById('secSummary').classList.remove('hidden');
    window.scrollTo(0,0);
}

function editForm() {
    document.getElementById('secSummary').classList.add('hidden');
    document.getElementById('sec1').classList.remove('hidden');
    currentSec=1; updateProgress(); window.scrollTo(0,0);
}

async function submitForm() {
    const t = T[lang];
    const payload = { lang: 'en', timestamp: new Date().toISOString() };
    FIELDS_BY_SECTION.forEach(fields => fields.forEach(id => {
        payload[id] = id in checks
            ? checks[id].map(v => EN_VALUES[v] || v)
            : getEnVal(id);
    }));
    try {
        await fetch(SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        document.getElementById('secSummary').classList.add('hidden');
        document.getElementById('secSuccess').classList.remove('hidden');
        window.scrollTo(0,0);
    } catch(e) { alert(t.alertSubmitFail); }
}

function copyClipboard() {
    const t = T[lang];
    let text = '=== CREATOR ONBOARDING ===\n\n';
    FIELDS_BY_SECTION.forEach((fields, i) => {
        text += t.sectionTitles[i]+'\n';
        fields.forEach(id => { const v=getVal(id); if(v) text+=`${t.labels[id]||id}: ${v}\n`; });
        text += '\n';
    });
    navigator.clipboard.writeText(text).then(()=>alert(t.alertCopied)).catch(()=>alert(t.alertCopyFail));
}

// Init — wait for language selection
</script>
