<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Onboarding - Perlage Studios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 720px; margin: 0 auto; background: white;
            border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; position: relative;
        }

        .header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; padding:36px 40px; text-align:center; }
        .header h1 { font-size:1.9em; margin-bottom:8px; font-weight:700; }
        .header p { opacity:0.9; font-size:1.05em; }

        /* Language selector bar */
        .lang-bar { display:flex; justify-content:center; gap:8px; padding:16px 24px; background:rgba(102,126,234,0.04); border-bottom:1px solid rgba(102,126,234,0.1); flex-wrap:wrap; }
        .lang-btn { padding:7px 16px; border-radius:20px; border:2px solid rgba(102,126,234,0.25); background:white; color:#667eea; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
        .lang-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-color:transparent; }
        .lang-btn:hover:not(.active) { border-color:#667eea; background:rgba(102,126,234,0.06); }

        .content { padding:36px 40px; }
        .progress-wrap { margin-bottom:28px; }
        .progress-bar { width:100%; height:6px; background:#e2e8f0; border-radius:10px; overflow:hidden; margin-bottom:8px; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); width:16.6%; transition:width 0.4s ease; border-radius:10px; }
        .progress-text { text-align:center; color:#667eea; font-weight:600; font-size:12px; }
        .section-card { background:#fff; border:1px solid rgba(102,126,234,0.12); border-radius:14px; padding:24px; box-shadow:0 2px 8px rgba(102,126,234,0.05); margin-bottom:20px; }
        .section-header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-radius:8px; padding:12px 16px; margin-bottom:24px; font-size:15px; font-weight:600; }
        .section-hint { background:rgba(102,126,234,0.06); border-left:3px solid #667eea; border-radius:0 8px 8px 0; padding:10px 14px; margin-bottom:20px; font-size:13px; color:#667eea; font-style:italic; }
        .field { margin-bottom:22px; }
        .field label { display:block; font-weight:600; color:#2d3748; font-size:14px; margin-bottom:8px; }
        .req { color:#e53e3e; }
        input[type="text"], input[type="number"], textarea, select {
            width:100%; padding:11px 14px; border:2px solid #e2e8f0; border-radius:8px;
            font-size:14px; color:#2d3748; background:#fff; outline:none;
            font-family:inherit; transition:border-color 0.2s; box-sizing:border-box;
        }
        input:focus, textarea:focus, select:focus { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
        textarea { min-height:90px; resize:vertical; }
        select {
            cursor:pointer; appearance:none;
            background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat:no-repeat; background-position:right 12px center; background-size:18px; padding-right:38px;
        }
        .pills { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
        .pill { display:flex; align-items:center; gap:7px; padding:8px 14px; border-radius:8px; border:2px solid #e2e8f0; background:#fff; cursor:pointer; font-size:13px; color:#4a5568; font-weight:400; user-select:none; transition:all 0.15s; font-family:inherit; }
        .pill.checked { border-color:#667eea; background:rgba(102,126,234,0.08); color:#667eea; font-weight:600; }
        .pill-box { width:16px; height:16px; border-radius:4px; border:2px solid #cbd5e0; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
        .pill.checked .pill-box { border-color:#667eea; background:#667eea; }
        .checkmark { display:none; }
        .pill.checked .checkmark { display:block; }
        .hidden { display:none !important; }
        .btn-row { display:flex; gap:10px; margin-top:4px; }
        .btn-primary { flex:1; padding:13px 20px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(102,126,234,0.4); }
        .btn-secondary { padding:13px 20px; background:rgba(0,0,0,0.04); color:#718096; border:1px solid rgba(0,0,0,0.1); border-radius:8px; font-size:14px; cursor:pointer; font-family:inherit; }
        .btn-outline { padding:13px 20px; background:white; color:#667eea; border:1px solid rgba(102,126,234,0.3); border-radius:8px; font-size:14px; cursor:pointer; font-family:inherit; }
        .summary-block { background:#fff; border:1px solid rgba(102,126,234,0.12); border-radius:14px; padding:20px 24px; margin-bottom:14px; box-shadow:0 2px 8px rgba(102,126,234,0.05); }
        .summary-block h3 { color:#667eea; font-size:16px; margin-bottom:14px; font-weight:700; }
        .summary-row { display:flex; gap:12px; padding:7px 0; border-bottom:1px solid rgba(102,126,234,0.06); font-size:14px; }
        .summary-row:last-child { border-bottom:none; }
        .summary-label { color:#9b8fc4; font-weight:600; min-width:180px; flex-shrink:0; font-size:13px; }
        .summary-val { color:#2d3748; }
        .success { text-align:center; padding:40px 24px; }
        .success .icon { font-size:52px; margin-bottom:16px; }
        .success h2 { color:#667eea; font-size:1.8em; margin-bottom:12px; }
        .success p { color:#4a5568; font-size:15px; line-height:1.8; margin-bottom:16px; }
        .lang-splash-btn { width:100%; padding:14px 20px; background:white; color:#667eea; border:2px solid rgba(102,126,234,0.3); border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
        .lang-splash-btn:hover { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-color:transparent; transform:translateY(-1px); box-shadow:0 8px 20px rgba(102,126,234,0.3); }
        @media (max-width:600px) { .content{padding:24px 20px;} .header{padding:28px 20px;} .header h1{font-size:1.5em;} .btn-row{flex-direction:column;} .summary-label{min-width:110px;} }
    </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = 'en';
let currentSec = 1;
const TOTAL = 6;
const checks = { equipment_list:[], platforms:[] };
const REQUIRED = {
    1:['name','age','height','nationality','location'],
    2:['longterm_goal','income_goal','hours_per_day','availability','no_gos'],
    3:[],
    4:['phone_model','quiet_space','outfits'],
    5:['existing_content'],
    6:['agency_before']
};
const FIELDS_BY_SECTION = [
    ['name','age','height','nationality','location','job'],
    ['longterm_goal','income_goal','hours_per_day','availability','no_gos'],
    ['hobbies','talents','pets','locations','special_items'],
    ['phone_model','equipment_list','quiet_space','outfits'],
    ['platforms','existing_content'],
    ['agency_before','agency_experience','anything_else']
];

function chooseLang(l) {
    document.getElementById('langSplash').classList.add('hidden');
    document.getElementById('formContent').classList.remove('hidden');
    setLang(l);
}

function backToLang() {
    document.getElementById('formContent').classList.add('hidden');
    document.getElementById('langSplash').classList.remove('hidden');
    document.getElementById('langDropdown').value = '';
}

function setLang(l) {
    lang = l;
    applyTranslations();
}

function applyTranslations() {
    const t = T[lang];
    document.getElementById('headerSub').textContent = t.headerSub;
    const clb = document.getElementById('changeLangBtn');
    if (clb) clb.textContent = {en:'← Change language', de:'← Sprache ändern', es:'← Cambiar idioma', fr:'← Changer de langue'}[lang] || '← Change language';
    updateProgress();

    // Section headers
    ['s1','s2','s3','s4','s5','s6'].forEach((id,i) => {
        const el = document.getElementById(id+'header');
        if (el) el.textContent = t['s'+(i+1)];
    });
    const hint = document.getElementById('s3hint');
    if (hint) hint.textContent = t.s3hint;

    // Questions
    for (let i=1; i<=24; i++) {
        const el = document.getElementById('q'+i);
        if (el) el.textContent = t['q'+i] || '';
    }
    const qc = document.getElementById('q23b'); if(qc) qc.textContent = t.q23b;
    const qq = document.getElementById('ql_quiet'); if(qq) qq.textContent = t.q_quiet;
    const qo = document.getElementById('ql_outfits'); if(qo) qo.textContent = t.q_outfits;

    // Placeholders
    const ph = { name:'ph_name', height:'ph_height', nationality:'ph_nationality', location:'ph_location', job:'ph_job', longterm_goal:'ph_goal', income_goal:'ph_income', no_gos:'ph_nogos', hobbies:'ph_hobbies', talents:'ph_talents', pets:'ph_pets', locations:'ph_locations', special_items:'ph_special', phone_model:'ph_phone', agency_experience:'ph_agency', anything_else:'ph_else' };
    Object.entries(ph).forEach(([id, key]) => { const el=document.getElementById(id); if(el) el.placeholder = t[key]||''; });

    // Dropdowns
    buildSelect('hours_per_day', t.hours, t.please);
    buildSelect('availability', t.avail, t.please);
    buildSelect('quiet_space', t.quiet, t.please);
    buildSelect('outfits', t.outfits, t.please);
    buildSelect('existing_content', t.existing, t.please);
    buildSelect('agency_before', t.yesno, t.please);

    // Pills
    buildPills('equipment_list', t.equipment);
    buildPills('platforms', t.platforms);

    // Buttons
    document.getElementById('btn1next').textContent = t.next;
    document.getElementById('btn2back').textContent = t.back;
    document.getElementById('btn2next').textContent = t.next;
    document.getElementById('btn3back').textContent = t.back;
    document.getElementById('btn3next').textContent = t.next;
    document.getElementById('btn4back').textContent = t.back;
    document.getElementById('btn4next').textContent = t.next;
    document.getElementById('btn5back').textContent = t.back;
    document.getElementById('btn5next').textContent = t.next;
    document.getElementById('btn6back').textContent = t.back;
    document.getElementById('btn6next').textContent = t.review;
    document.getElementById('summaryTitle').textContent = t.summaryTitle;
    document.getElementById('btnEdit').textContent = t.edit;
    document.getElementById('btnCopy').textContent = t.copy;
    document.getElementById('btnSubmit').textContent = t.submit;
    document.getElementById('successTitle').textContent = t.successTitle;
    document.getElementById('successMsg').textContent = t.successMsg;
    document.getElementById('btnCopy2').textContent = t.copySum;
    document.getElementById('btnAnother').textContent = t.another;
}

function buildSelect(id, options, placeholder) {
    const sel = document.getElementById(id);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = `<option value="">${placeholder}</option>` + options.map(o => `<option value="${o}"${current===o?' selected':''}>${o}</option>`).join('');
}

function buildPills(groupId, options) {
    const container = document.getElementById(groupId);
    if (!container) return;
    const selected = checks[groupId] || [];
    // Remap: keep selected values by position if language changed
    checks[groupId] = [];
    container.innerHTML = options.map((o,i) => `
        <div class="pill${selected.length > i && selected[i] ? ' checked':''}" data-val="${o}" onclick="togglePill(this,'${groupId}')">
            <span class="pill-box">
                <svg class="checkmark" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>${o}
        </div>`).join('');
}

function updateProgress() {
    const t = T[lang];
    document.getElementById('progressFill').style.width = (currentSec/TOTAL*100)+'%';
    document.getElementById('progressText').textContent = t.progress(currentSec, TOTAL);
}

function togglePill(el, group) {
    const val = el.dataset.val;
    if (checks[group].includes(val)) { checks[group]=checks[group].filter(v=>v!==val); el.classList.remove('checked'); }
    else { checks[group].push(val); el.classList.add('checked'); }
}

function toggleOF() {
    const val = document.getElementById('has_onlyfans').value;
    const t = T[lang];
    document.getElementById('onlyfans_link_field').classList.toggle('hidden', val !== t.of_yes);
}

function toggleAgency() {
    const val = document.getElementById('agency_before').value;
    const t = T[lang];
    document.getElementById('agency_exp_field').classList.toggle('hidden', val !== t.agency_yes);
}

// Map of localised option values -> English equivalents
const EN_VALUES = {};
function buildEnMap() {
    const en = T['en'];
    const keys = ['hours','avail','quiet','outfits','yesno','existing','equipment','platforms'];
    ['de','es','fr'].forEach(l => {
        keys.forEach(k => {
            T[l][k].forEach((v, i) => { EN_VALUES[v] = en[k][i]; });
        });
    });
}
buildEnMap();

function toEnglish(val) {
    if (!val) return val;
    // For comma-separated pill values
    if (val.includes(', ')) return val.split(', ').map(v => EN_VALUES[v] || v).join(', ');
    return EN_VALUES[val] || val;
}

function getVal(id) {
    if (id in checks) return checks[id].join(', ');
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
}

function getEnVal(id) {
    const v = getVal(id);
    return toEnglish(v);
}

function validate(secNum) {
    const t = T[lang];
    for (const id of (REQUIRED[secNum]||[])) {
        if (!getVal(id)) {
            const el = document.getElementById(id);
            if (el) { el.style.borderColor='#e53e3e'; el.focus(); }
            alert(t.alertRequired);
            return false;
        }
    }
    (REQUIRED[secNum]||[]).forEach(id => { const el=document.getElementById(id); if(el) el.style.borderColor='#e2e8f0'; });
    return true;
}

function goTo(from, to) {
    if (to > from && !validate(from)) return;
    document.getElementById('sec'+from).classList.add('hidden');
    document.getElementById('sec'+to).classList.remove('hidden');
    currentSec=to; updateProgress(); window.scrollTo(0,0);
}

function showSummary() {
    if (!validate(6)) return;
    const t = T[lang];
    let html = '';
    FIELDS_BY_SECTION.forEach((fields, i) => {
        const rows = fields.map(id => {
            const v = getVal(id); if (!v) return '';
            return `<div class="summary-row"><span class="summary-label">${t.labels[id]||id}</span><span class="summary-val">${v}</span></div>`;
        }).filter(Boolean).join('');
        if (rows) html += `<div class="summary-block"><h3>${t.sectionTitles[i]}</h3>${rows}</div>`;
    });
    document.getElementById('summaryContent').innerHTML = html;
    document.getElementById('sec6').classList.add('hidden');
    document.getElementById('secSummary').classList.remove('hidden');
    window.scrollTo(0,0);
}

function editForm() {
    document.getElementById('secSummary').classList.add('hidden');
    document.getElementById('sec1').classList.remove('hidden');
    currentSec=1; updateProgress(); window.scrollTo(0,0);
}

async function submitForm() {
    const t = T[lang];
    const payload = { lang: 'en', timestamp: new Date().toISOString() };
    FIELDS_BY_SECTION.forEach(fields => fields.forEach(id => {
        payload[id] = id in checks
            ? checks[id].map(v => EN_VALUES[v] || v)
            : getEnVal(id);
    }));
    try {
        await fetch(SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        document.getElementById('secSummary').classList.add('hidden');
        document.getElementById('secSuccess').classList.remove('hidden');
        window.scrollTo(0,0);
    } catch(e) { alert(t.alertSubmitFail); }
}

function copyClipboard() {
    const t = T[lang];
    let text = '=== CREATOR ONBOARDING ===\n\n';
    FIELDS_BY_SECTION.forEach((fields, i) => {
        text += t.sectionTitles[i]+'\n';
        fields.forEach(id => { const v=getVal(id); if(v) text+=`${t.labels[id]||id}: ${v}\n`; });
        text += '\n';
    });
    navigator.clipboard.writeText(text).then(()=>alert(t.alertCopied)).catch(()=>alert(t.alertCopyFail));
}
